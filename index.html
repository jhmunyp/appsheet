<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Image Viewer</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: #111;
}

#viewer {
  width: 100%;
  height: 100%;
  touch-action: none;
  overflow: hidden;
  position: relative;
}

#stage {
  position: absolute;
  left: 0;
  top: 0;
  transform-origin: 0 0;
}

img {
  display: block;
  max-width: none;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}

.controls {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}

.controls button {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
}
</style>

</head>

<body>

<div id="viewer">
  <div id="stage">
    <!-- 🔥 파일명 바꿔 -->
    <img src="UX.jpg" id="image">
  </div>
</div>

<div class="controls">
  <button onclick="zoomAtCenter(1.2)">+</button>
  <button onclick="zoomAtCenter(0.8)">-</button>
  <button onclick="resetView()">Reset</button>
</div>

<script>
const viewer = document.getElementById("viewer");
const stage = document.getElementById("stage");

let scale = 1;
let posX = 0;
let posY = 0;

let isDragging = false;
let startX, startY;

let lastDist = null;
let lastTap = 0;

/* 업데이트 */
function update() {
  stage.style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`;
}

/* 중심 기준 줌 */
function zoom(factor, centerX, centerY) {
  const rect = viewer.getBoundingClientRect();

  const x = (centerX - rect.left - posX) / scale;
  const y = (centerY - rect.top - posY) / scale;

  scale *= factor;

  posX = centerX - rect.left - x * scale;
  posY = centerY - rect.top - y * scale;

  update();
}

function zoomAtCenter(factor) {
  zoom(factor, window.innerWidth / 2, window.innerHeight / 2);
}

function resetView() {
  scale = 1;
  posX = 0;
  posY = 0;
  update();
}

/* 터치 시작 */
viewer.addEventListener("touchstart", (e) => {
  const now = Date.now();

  // 더블탭 줌
  if (now - lastTap < 300) {
    zoom(1.5, e.touches[0].clientX, e.touches[0].clientY);
  }
  lastTap = now;

  if (e.touches.length === 1) {
    isDragging = true;
    startX = e.touches[0].clientX - posX;
    startY = e.touches[0].clientY - posY;
  }

  if (e.touches.length === 2) {
    isDragging = false;

    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastDist = Math.sqrt(dx * dx + dy * dy);
  }
});

/* 터치 이동 */
viewer.addEventListener("touchmove", (e) => {

  // 드래그
  if (e.touches.length === 1 && isDragging) {
    posX = e.touches[0].clientX - startX;
    posY = e.touches[0].clientY - startY;
    update();
  }

  // 핀치 줌 (중심 기준)
  if (e.touches.length === 2) {
    const t1 = e.touches[0];
    const t2 = e.touches[1];

    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    const centerX = (t1.clientX + t2.clientX) / 2;
    const centerY = (t1.clientY + t2.clientY) / 2;

    if (lastDist) {
      const factor = dist / lastDist;
      zoom(factor, centerX, centerY);
    }

    lastDist = dist;
  }
});

/* 터치 끝 */
viewer.addEventListener("touchend", () => {
  isDragging = false;
  lastDist = null;
});
</script>

</body>
</html>
